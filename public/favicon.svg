<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="1.5" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <g transform="translate(600, 400)">
    <g filter="url(#shadow)">
      <polygon points="0,-150 130,150 -130,150" fill="none" stroke="#7c3aed" stroke-width="12" stroke-linejoin="round"/>
      <rect x="-40" y="-40" width="80" height="60" fill="#f43f5e" stroke="none"/>
      <line x1="-30" y1="-20" x2="30" y2="-20" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>
</svg>
